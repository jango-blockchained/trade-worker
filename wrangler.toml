name = "trade-worker"
account_id = "profile"
main = "src/index.js"
compatibility_date = "2024-03-26"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
D1_WORKER_URL = "https://d1-worker.cryptolinx.workers.dev"

# Secrets managed via Cloudflare Secrets Store
secrets_store_secrets = [
  { binding = "INTERNAL_KEY_BINDING", store_id = "<YOUR_STORE_ID>", secret_name = "TRADE_INTERNAL_KEY" },
  { binding = "MEXC_KEY_BINDING",     store_id = "<YOUR_STORE_ID>", secret_name = "MEXC_API_KEY" },
  { binding = "MEXC_SECRET_BINDING",  store_id = "<YOUR_STORE_ID>", secret_name = "MEXC_API_SECRET" },
  { binding = "BINANCE_KEY_BINDING",  store_id = "<YOUR_STORE_ID>", secret_name = "BINANCE_API_KEY" },
  { binding = "BINANCE_SECRET_BINDING", store_id = "<YOUR_STORE_ID>", secret_name = "BINANCE_API_SECRET" },
  { binding = "BYBIT_KEY_BINDING",    store_id = "<YOUR_STORE_ID>", secret_name = "BYBIT_API_KEY" },
  { binding = "BYBIT_SECRET_BINDING", store_id = "<YOUR_STORE_ID>", secret_name = "BYBIT_API_SECRET" }
]
